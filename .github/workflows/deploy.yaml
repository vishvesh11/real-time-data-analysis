name: Build and Push Real-time App Images

on:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
      - "ingestor/**"
      - "processor/**"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DATA_INGESTOR: ${{ github.repository }}/realtime-ingestor
  DATA_PROCESSOR: ${{ github.repository }}/realtime-processor
  DATA_DASHBOARD: ${{ github.repository }}/realtime-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Ingestor image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ingestor
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.DATA_INGESTOR }}:latest

      - name: Build and push Processor image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.processor
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.DATA_PROCESSOR }}:latest

      - name: Build and push Dashboard image for ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          platforms: linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.DATA_DASHBOARD }}:latest
